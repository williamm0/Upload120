<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B5CFF"/>
      <stop offset="55%" stop-color="#3D7BFF"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.3" cy="0.18" r="0.55">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Squircle background (Apple-style, ~22.5% radius) -->
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="url(#gloss)"/>
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="url(#shine)"/>

  <!-- Motion trails: three play triangles, increasing opacity, suggesting speed -->
  <g filter="url(#ds)">
    <path d="M315 360 L515 512 L315 664 Z" fill="#FFFFFF" opacity="0.18"/>
    <path d="M395 360 L595 512 L395 664 Z" fill="#FFFFFF" opacity="0.34"/>
    <path d="M475 360 L675 512 L475 664 Z" fill="#FFFFFF"/>
  </g>

  <!-- Inner stroke for crispness -->
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>
</svg>
